# PLVA mediator sandbox policy — zero-egress (§7).
# The local LLM inside this sandbox may see vault cleartext, so it gets NO
# network allowlist entries at all: with OpenShell's deny-by-default L7 proxy,
# an empty network_policies map means every outbound connection is refused.
# The proxy reaches the model only through the gateway's explicit local port
# forward (host loopback -> sandbox 11434); nothing initiates from inside.
version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies: {}
